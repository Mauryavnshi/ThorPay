<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ThorPay</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
  <h2>⚡ ThorPay</h2>
  <button>Connect Wallet</button>
</nav>

<section class="hero">
  <h1>Fast USDC Payments on Arc Network</h1>
  <p>Simple, Secure and Instant Stablecoin Payments.</p>
</section>

<section class="features">
  <div class="card">
    <h3>⚡ Fast</h3>
    <p>Instant settlement on Arc.</p>
  </div>

  <div class="card">
    <h3>💵 USDC</h3>
    <p>Native Stablecoin Payments.</p>
  </div>

  <div class="card">
    <h3>🔒 Secure</h3>
    <p>Powered by Smart Contracts.</p>
  </div>
</section>

<section class="payment">
  <h2>Send Payment</h2>

  <input type="text" placeholder="Recipient Wallet Address">

  <input type="number" placeholder="Amount (USDC)">

  <button>Send Payment</button>
</section>

<footer>
  <p>Built on Arc Network 🚀</p>
</footer>

<script src="script.js"></script>

</body>
</html>
